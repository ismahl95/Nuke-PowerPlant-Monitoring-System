# H2 Database Configuration for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Defer datasource initialization until after entity definitions
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Hibernate Configuration for Tests
# Use 'create-drop' to create tables at startup and drop them at shutdown
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL for debugging (optional)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging Configuration for Tests
# Reduce verbosity of expected error logs during testing
logging.level.com.ihl95.nuclear.exception=OFF
logging.level.com.ihl95.nuclear.nuclearplant.application.service=WARN

# Disable Spring Security for E2E tests (RestAssured tests don't need auth chain)
# In production, security is enabled via application.properties
security.enable-auth=false

